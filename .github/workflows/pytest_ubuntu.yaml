name: Run pytest on Ubuntu (Python 3.11)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Conda with Mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          mamba-version: "*"
          channels: conda-forge,defaults
          auto-activate-base: false
          activate-environment: AC
      - name: Install conda dependencies
        shell: bash -l {0}
        run: |
          mamba install --file conda-requirements.txt
      - name: Install AdaptiveComputing in development mode
        shell: bash -l {0}
        run: |
          pip install -e .
          pip install git+https://github.com/NatLabRockies/tf-melt.git#egg=tfmelt
      - name: Lint with ruff
        shell: bash -l {0}
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check --select=E9,F63,F7,F82 --target-version=py311 .
          # default set of ruff rules with GitHub Annotations
          ruff check --target-version=py311 .
      - name: Test with pytest
        shell: bash -l {0}
        run: |
          python -m pytest --junitxml=pytest_report.xml
      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest_report.xml
      - name: Comment test results on PR
        if: github.event_name == 'pull_request'
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/pytest_report.xml'
          check_name: pytest tests
          require_tests: true
          token: ${{ secrets.GITHUB_TOKEN }}